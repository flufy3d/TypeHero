<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="打字英雄">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b6cff"/>
      <stop offset="1" stop-color="#4dd0e1"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9ecff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 背景（圆角方块，maskable 安全区在中央） -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 大键帽 -->
  <g filter="url(#soft)">
    <rect x="116" y="150" width="280" height="240" rx="46" fill="url(#cap)"/>
    <rect x="116" y="150" width="280" height="240" rx="46" fill="none" stroke="#c7ccff" stroke-width="4"/>
    <!-- 字母 A -->
    <text x="256" y="332" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif"
          font-size="190" font-weight="900" fill="#6c5ce7">A</text>
  </g>

  <!-- 成就星星 -->
  <g transform="translate(372 132)">
    <path d="M0 -52 L15 -16 L54 -16 L22 8 L34 46 L0 22 L-34 46 L-22 8 L-54 -16 L-15 -16 Z"
          fill="#ffd54a" stroke="#ffb300" stroke-width="5" stroke-linejoin="round"/>
  </g>
</svg>
