<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>打字英雄 · TypeHero</title>
  <meta name="description" content="儿童英文打字练习 —— 中文界面，英文 QWERTY 指法，离线可用，闯关收集徽章。" />
  <meta name="theme-color" content="#6c5ce7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="打字英雄" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="./assets/icons/icon.svg" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- 全屏特效画布（彩带 / 星星），不拦截点击 -->
  <canvas id="fx" aria-hidden="true"></canvas>

  <!-- 应用根容器，所有界面渲染于此 -->
  <main id="app" aria-live="polite"></main>

  <noscript>
    <p style="padding:2rem;text-align:center;font-size:1.2rem">
      打字英雄需要启用 JavaScript 才能运行。请在浏览器设置中开启 JavaScript。
    </p>
  </noscript>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
